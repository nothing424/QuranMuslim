<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuranMuslim</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">

  <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header class="header">
  <h1>QuranMuslim</h1>
  <div>
    <button id="focusBtn">🧘</button>
    <button id="themeToggle">☀️</button>
  </div>
</header>

<section class="hero">
  <h2>✨ QuranMuslim</h2>
  <p>Baca Quran dengan vibe modern & tenang</p>
</section>

<div class="search-box">
  <input type="text" id="search" placeholder="Cari surah..." />
</div>

<main>
  <section id="surahList"></section>
  <section id="ayatDetail" class="hidden"></section>
</main>

<!-- MINI PLAYER -->
<div id="miniPlayer" class="mini-player hidden">
  <div>
    <span id="trackTitle">-</span><br>
    <small id="trackAyat">-</small>
  </div>

  <div>
    <button onclick="prevTrack()">⏮</button>
    <button onclick="togglePlay()">▶</button>
    <button onclick="nextTrack()">⏭</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
